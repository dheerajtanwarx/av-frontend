<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AV Creation — Compare Directions</title>
<style>
  html,body{margin:0;height:100%;background:#efe9df;font-family:'Jost',system-ui,sans-serif;}
  .dc-frame{width:100%;height:100%;border:0;display:block;background:#fbf6ee;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const PAGE_W = 1280;

function PageFrame({ src, onHeight }){
  const ref = React.useRef(null);
  const measure = () => {
    try{
      const doc = ref.current.contentWindow.document;
      const h = Math.max(doc.documentElement.scrollHeight, doc.body.scrollHeight);
      if (h > 200) onHeight(h);
    }catch(e){}
  };
  return <iframe ref={ref} className="dc-frame" src={src} scrolling="no"
    onLoad={() => { measure(); setTimeout(measure, 700); setTimeout(measure, 1800); }} />;
}

function App(){
  const [heights, setHeights] = React.useState({ a: 5600, b: 5600 });
  const setH = (k) => (h) => setHeights((p) => Math.abs(p[k] - h) > 4 ? { ...p, [k]: h } : p);
  return (
    <DesignCanvas>
      <DCSection id="dir" title="AV Creation — Landing Page" subtitle="Two directions · click a title (or the ⤢ icon) to open one fullscreen">
        <DCArtboard id="a" label="A · Heritage Atelier" width={PAGE_W} height={heights.a}>
          <PageFrame src="Heritage Atelier.html" onHeight={setH('a')} />
        </DCArtboard>
        <DCArtboard id="b" label="B · Royal Darbar" width={PAGE_W} height={heights.b}>
          <PageFrame src="Royal Darbar.html" onHeight={setH('b')} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
